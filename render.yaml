services:
  # ── Backend (Python/Flask Web Service) ─────────────────────────────────────
  - type: web
    name: shadowwatch-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET_KEY
        sync: false          # Set manually in Render dashboard
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: run.py
      - key: FRONTEND_URL
        fromService:
          name: shadowwatch-frontend
          type: web
          property: host      # Injected as https://shadowwatch-frontend.onrender.com
    healthCheckPath: /api/health

  # ── Frontend (React/Vite Static Site) ──────────────────────────────────────
  - type: web
    name: shadowwatch-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: shadowwatch-backend
          type: web
          property: hostport  # Resolves to https://shadowwatch-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html  # SPA fallback for React Router
